services:
  # 全栈镜像 - 包含前端和后端
  fullstack:
    cpu_shares: 50
    command: []
    container_name: bililive-tools_test
    deploy:
      resources:
        limits:
          memory: "8589934592"
        reservations:
          devices:
            - capabilities:
                - gpu
              driver: nvidia
              count: -1
    environment:
      BILILIVE_TOOLS_BILIKEY: 18234002278ASD
      BILILIVE_TOOLS_PASSKEY: 18234002278ASD
      LANG: zh_CN.UTF-8
      LANGUAGE: zh_CN:zh
      LC_ALL: zh_CN.UTF-8
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      TZ: Asia/Shanghai
    group_add:
      - "110"
      - video
    hostname: bililive-tools
    # 使用本地源码构建（包含 autoClip 功能）
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: fullstack
      args:
        VITE_FULLSTACK: "true"
    # image: renmu1234/bililive-tools  # 预构建镜像（不含 autoClip）
    labels:
      icon: https://icon.casaos.io/main/all/webui.png
    network_mode: bridge
    ports:
      - target: 3000
        published: "3000"
    privileged: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/Storage/video_music/live-recorder2/data
        target: /app/data
      - type: bind
        source: /DATA/Storage/video_music/live-recorder2/video
        target: /app/video
      - type: bind
        source: /DATA/Storage/video_music/live-recorder2/video2
        target: /app/video2
      - type: bind
        source: /DATA/Storage/video_music/live-recorder2/fonts
        target: /usr/local/share/fonts
